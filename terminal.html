<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - Syefdi's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
    <div class="terminal-window">
        <div class="title-bar">
            <div class="traffic-lights">
                <span class="light red"></span>
                <span class="light yellow"></span>
                <span class="light green"></span>
            </div>
            <div class="title">syefdi@portfolio ~</div>
            <a href="index.html" class="exit-terminal" title="Back to visual portfolio">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </a>
        </div>
        <div class="terminal-body" id="terminal">
            <div id="output"></div>
            <div class="input-line">
                <span class="prompt">syefdi@portfolio:~$</span>
                <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
                <span class="cursor"></span>
            </div>
        </div>
    </div>
    <script src="js/terminal.js"></script>
</body>
</html>
